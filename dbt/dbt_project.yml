name: instacart_analytics
version: "1.0.0"
config-version: 2

profile: instacart_analytics

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

models:
  instacart_analytics:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: view
    marts:
      core:
        +schema: core
        +materialized: table
      kpis:
        +schema: kpis
        +materialized: table
      analysis:
        +schema: analysis
        +materialized: table
